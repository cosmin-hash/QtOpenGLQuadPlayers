<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="13" markerHeight="13" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#44474d"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="15" markerHeight="15" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e08a1e"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1600" height="1040" fill="#ffffff"/>

  <!-- title -->
  <text x="800" y="48" text-anchor="middle" font-size="30" font-weight="700" fill="#1e1f22">QtOpenGLQuadPlayers &#8212; Concurrency Architecture</text>
  <text x="800" y="80" text-anchor="middle" font-size="16" fill="#6a6d73">Per-pane decode threads &#8594; bounded hand-off queue &#8594; GUI-thread GL upload &#160;&#160;(&#215;4 independent panes)</text>

  <!-- lane backgrounds -->
  <rect x="40" y="110" width="900" height="820" rx="14" fill="#eaf2fb" stroke="#cfe0f2" stroke-width="1.5"/>
  <rect x="1000" y="110" width="560" height="820" rx="14" fill="#eaf7ee" stroke="#d2ecdb" stroke-width="1.5"/>

  <!-- lane headers -->
  <rect x="40" y="110" width="900" height="46" rx="14" fill="#2f6fb0"/>
  <text x="490" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">WORKER THREADS &#8212; one QThread per pane (&#215;4)</text>
  <rect x="1000" y="110" width="560" height="46" rx="14" fill="#2e8b57"/>
  <text x="1280" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">GUI THREAD &#8212; shared</text>

  <!-- thread boundary -->
  <line x1="970" y1="170" x2="970" y2="905" stroke="#9aa0a6" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="970" y="895" text-anchor="middle" font-size="12" fill="#9aa0a6" transform="rotate(-90 970 895)">thread boundary</text>

  <!-- ===================== WORKER LANE PIPELINE ===================== -->

  <!-- stacked-card hint (x4) behind each box: two offset sheets per box -->
  <!-- Image Directory -->
  <rect x="94" y="381" width="200" height="130" rx="10" fill="#fbfcfd" stroke="#8a9099" stroke-width="1.8"/>
  <rect x="82" y="393" width="200" height="130" rx="10" fill="#ffffff" stroke="#6f757d" stroke-width="1.8"/>
  <!-- DecodeWorker -->
  <rect x="394" y="366" width="230" height="160" rx="10" fill="#eef5fc" stroke="#7ba8d6" stroke-width="1.8"/>
  <rect x="382" y="378" width="230" height="160" rx="10" fill="#ffffff" stroke="#4f8bc4" stroke-width="1.8"/>
  <!-- FrameQueue -->
  <rect x="724" y="381" width="210" height="130" rx="10" fill="#fff8ec" stroke="#e6bd84" stroke-width="1.8"/>
  <rect x="712" y="393" width="210" height="130" rx="10" fill="#fff4e0" stroke="#dca557" stroke-width="1.8"/>

  <!-- Image Directory -->
  <rect x="70" y="405" width="200" height="130" rx="10" fill="#ffffff" stroke="#5a5d63" stroke-width="1.8"/>
  <text x="170" y="452" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1f22">Image Directory</text>
  <text x="170" y="480" text-anchor="middle" font-size="13" fill="#6a6d73">numbered frame files</text>
  <text x="170" y="500" text-anchor="middle" font-size="13" fill="#6a6d73">*.jpg &#183; *.png &#183; &#8230;</text>

  <!-- DecodeWorker -->
  <rect x="370" y="390" width="230" height="160" rx="10" fill="#ffffff" stroke="#2f6fb0" stroke-width="2.4"/>
  <text x="485" y="438" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1f22">DecodeWorker</text>
  <text x="485" y="466" text-anchor="middle" font-size="13" fill="#6a6d73">scan &#183; decode frames</text>
  <text x="485" y="486" text-anchor="middle" font-size="13" fill="#6a6d73">QImageReader (off GUI)</text>
  <text x="485" y="520" text-anchor="middle" font-size="12.5" font-style="italic" fill="#2f6fb0">&#8635; QTimer &#183; 24 fps &#215; speed</text>

  <!-- FrameQueue -->
  <rect x="700" y="405" width="210" height="130" rx="10" fill="#fff4e0" stroke="#e08a1e" stroke-width="2.4"/>
  <text x="805" y="452" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1f22">FrameQueue</text>
  <text x="805" y="480" text-anchor="middle" font-size="13" fill="#8a6516">bounded (N = 3) &#183; mutex</text>
  <text x="805" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#b9701a">drop&#8211;oldest</text>

  <!-- worker arrows -->
  <line x1="278" y1="470" x2="362" y2="470" stroke="#44474d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="320" y="456" text-anchor="middle" font-size="12.5" fill="#44474d">read</text>
  <line x1="608" y1="470" x2="692" y2="470" stroke="#44474d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="650" y="456" text-anchor="middle" font-size="12.5" font-family="Consolas, monospace" fill="#44474d">push()</text>

  <!-- ===================== CROSS-THREAD HAND-OFF ===================== -->
  <line x1="918" y1="470" x2="1122" y2="438" stroke="#e08a1e" stroke-width="3.2" marker-end="url(#arrowAccent)"/>
  <text x="1016" y="383" text-anchor="middle" font-size="14" font-weight="700" font-family="Consolas, monospace" fill="#b9701a">frameAvailable()</text>
  <text x="1016" y="401" text-anchor="middle" font-size="12.5" font-style="italic" fill="#b9701a">queued signal &#8594; GUI</text>

  <!-- ===================== GUI LANE PIPELINE ===================== -->

  <!-- consume -->
  <rect x="1130" y="360" width="300" height="120" rx="10" fill="#ffffff" stroke="#2e8b57" stroke-width="2.4"/>
  <text x="1280" y="398" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1f22">GLViewport &#183; consume</text>
  <text x="1280" y="426" text-anchor="middle" font-size="13" font-family="Consolas, monospace" fill="#6a6d73">popLatest()</text>
  <text x="1280" y="448" text-anchor="middle" font-size="12.5" fill="#6a6d73">take freshest, drop stale</text>

  <!-- upload -->
  <rect x="1130" y="540" width="300" height="120" rx="10" fill="#ffffff" stroke="#5a5d63" stroke-width="1.8"/>
  <text x="1280" y="578" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1f22">OpenGL texture upload</text>
  <text x="1280" y="606" text-anchor="middle" font-size="12.5" font-family="Consolas, monospace" fill="#6a6d73">glTexImage2D / glTexSubImage2D</text>
  <text x="1280" y="628" text-anchor="middle" font-size="12.5" font-style="italic" fill="#2e8b57">GUI thread only (GL context)</text>

  <!-- render -->
  <rect x="1130" y="720" width="300" height="130" rx="10" fill="#ffffff" stroke="#5a5d63" stroke-width="1.8"/>
  <text x="1230" y="772" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1f22">Render</text>
  <text x="1230" y="800" text-anchor="middle" font-size="13" fill="#6a6d73">QOpenGLWidget</text>
  <text x="1230" y="820" text-anchor="middle" font-size="12.5" fill="#6a6d73">shaded quad + filter</text>
  <!-- mini 2x2 grid glyph -->
  <g stroke="#2e8b57" stroke-width="2" fill="#eaf7ee">
    <rect x="1348" y="748" width="28" height="28" rx="3"/>
    <rect x="1380" y="748" width="28" height="28" rx="3"/>
    <rect x="1348" y="780" width="28" height="28" rx="3"/>
    <rect x="1380" y="780" width="28" height="28" rx="3"/>
  </g>
  <text x="1378" y="832" text-anchor="middle" font-size="11.5" fill="#2e8b57">2&#215;2 grid</text>

  <!-- gui arrows -->
  <line x1="1280" y1="480" x2="1280" y2="540" stroke="#44474d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1280" y1="660" x2="1280" y2="720" stroke="#44474d" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===================== FOOTER NOTES ===================== -->
  <rect x="40" y="948" width="1520" height="78" rx="12" fill="#f5f6f7" stroke="#dfe1e5" stroke-width="1.5"/>
  <text x="62" y="975" font-size="13.5" fill="#3a3d42"><tspan font-weight="700" fill="#b9701a">&#9679; Drop-oldest:</tspan> a slow consumer can never grow memory &#8212; the newest frame always wins under load, keeping latency low.</text>
  <text x="62" y="997" font-size="13.5" fill="#3a3d42"><tspan font-weight="700" fill="#2e8b57">&#9679; Thread affinity:</tspan> every GL call runs on the GUI thread that owns the OpenGL context; only decoded QImages cross the boundary.</text>
  <text x="62" y="1019" font-size="13.5" fill="#3a3d42"><tspan font-weight="700" fill="#2f6fb0">&#9679; Clean shutdown:</tspan> stop timers in-thread (blocking) &#8594; thread.quit() &#8594; thread.wait() &#8594; worker auto-deleted via finished&#8594;deleteLater.</text>
</svg>
